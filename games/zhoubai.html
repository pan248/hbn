<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <title>慢慢焕 · 昼夜循时 — HBN</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    body { background:#F5EDE3; }
    .game-page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }

    /* Header */
    .game-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
    .game-back { display:flex; align-items:center; gap:6px; text-decoration:none; color:#8B7D72; font-size:13px; letter-spacing:2px; -webkit-tap-highlight-color:transparent; }
    .game-back svg { width:18px; height:18px; stroke:#8B7D72; }
    .game-header-title { font-family:'Noto Serif SC',serif; font-size:14px; letter-spacing:4px; color:#C9A96E; }
    .game-score-display { font-size:13px; color:#8B7D72; letter-spacing:2px; }
    .game-score-display em { font-style:normal; color:#C9A96E; font-size:18px; }

    /* Product Showcase */
    .product-hero { text-align:center; padding:8px 24px 16px; }
    .product-hero img { max-width:180px; max-height:120px; object-fit:contain; border-radius:4px; }
    .product-name { font-family:'Noto Serif SC',serif; font-size:15px; letter-spacing:3px; color:#2C1810; margin-top:8px; }
    .product-sub { font-size:11px; letter-spacing:2px; color:#8B7D72; margin-top:4px; }

    /* Game area */
    .game-area { flex:1; display:flex; flex-direction:column; padding:0 20px 16px; }

    /* Drop zone row */
    .zones { display:flex; gap:12px; margin-bottom:16px; }
    .zone {
      flex:1; padding:16px 12px; border-radius:4px; text-align:center;
      transition: all 0.4s cubic-bezier(0.25,0.1,0.25,1);
      min-height:120px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
      position:relative; overflow:hidden;
    }
    .zone-morning {
      background: linear-gradient(135deg, rgba(201,169,110,0.08), rgba(212,184,122,0.15));
      border:0.5px solid rgba(201,169,110,0.25);
    }
    .zone-evening {
      background: linear-gradient(135deg, rgba(139,111,94,0.1), rgba(44,24,16,0.12));
      border:0.5px solid rgba(139,111,94,0.25);
    }
    .zone-label { font-family:'Noto Serif SC',serif; font-size:16px; letter-spacing:4px; margin-bottom:8px; }
    .zone-morning .zone-label { color:#C9A96E; }
    .zone-evening .zone-label { color:#8B6F5E; }
    .zone-product { font-size:10px; letter-spacing:1px; color:#8B7D72; margin-bottom:6px; line-height:1.6; }
    .zone-dropped { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-top:6px; }
    .zone-dropped .mini-tag {
      font-size:9px; padding:2px 8px; border-radius:2px; letter-spacing:1px;
      animation: tag-in 0.5s cubic-bezier(0.25,0.1,0.25,1);
    }
    @keyframes tag-in { from { opacity:0; transform:scale(0.7); } to { opacity:1; transform:scale(1); } }
    .zone-morning .mini-tag { background:rgba(201,169,110,0.15); color:#C9A96E; }
    .zone-evening .mini-tag { background:rgba(139,111,94,0.15); color:#8B6F5E; }

    .zone.highlight { box-shadow:0 0 20px rgba(201,169,110,0.2); }

    /* Ingredient carousel */
    .carousel-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .carousel-hint { font-family:'Noto Serif SC',serif; font-size:12px; letter-spacing:3px; color:#8B7D72; margin-bottom:16px; }

    .card-carousel { position:relative; width:100%; max-width:320px; height:200px; }
    .ingredient-card {
      position:absolute; width:100%; padding:24px; background:rgba(255,255,255,0.7);
      border:0.5px solid rgba(201,169,110,0.2); border-radius:4px; text-align:center;
      transition: all 0.6s cubic-bezier(0.25,0.1,0.25,1);
      cursor:grab; -webkit-tap-highlight-color:transparent; user-select:none;
    }
    .ingredient-card:active { cursor:grabbing; }
    .ingredient-card .ing-name { font-family:'Noto Serif SC',serif; font-size:20px; letter-spacing:3px; color:#2C1810; }
    .ingredient-card .ing-desc { font-size:12px; letter-spacing:1px; color:#8B7D72; margin-top:8px; line-height:1.8; }
    .ingredient-card .ing-type { font-size:10px; letter-spacing:2px; color:#C9A96E; margin-top:10px; }

    /* Action buttons */
    .action-row { display:flex; gap:12px; margin-top:16px; width:100%; max-width:320px; }
    .action-btn {
      flex:1; padding:14px 0; text-align:center; font-family:'Noto Serif SC',serif;
      font-size:14px; letter-spacing:4px; cursor:pointer; border-radius:3px;
      transition: all 0.4s cubic-bezier(0.25,0.1,0.25,1); -webkit-tap-highlight-color:transparent;
    }
    .action-btn:active { transform:scale(0.96); }
    .btn-morning { background:rgba(201,169,110,0.12); border:0.5px solid #C9A96E; color:#C9A96E; }
    .btn-evening { background:rgba(139,111,94,0.1); border:0.5px solid #8B6F5E; color:#8B6F5E; }

    /* Progress bar */
    .progress-section { padding:16px 24px; }
    .progress-label { font-size:11px; letter-spacing:3px; color:#8B7D72; margin-bottom:8px; text-align:center; }
    .progress-bar { width:100%; height:4px; background:rgba(201,169,110,0.15); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#C9A96E,#8B6F5E); border-radius:2px; transition:width 0.8s cubic-bezier(0.25,0.1,0.25,1); width:0%; }
    .progress-stats { display:flex; justify-content:space-between; margin-top:8px; }
    .progress-stat { font-size:10px; letter-spacing:1px; color:#8B7D72; }

    /* Wrong flash */
    @keyframes wrong-flash { 0%,100%{background:transparent;} 50%{background:rgba(200,80,80,0.08);} }
    .wrong-flash { animation: wrong-flash 0.4s; }

    /* Result popup */
    .result-card {
      position:fixed; inset:0; background:rgba(245,237,227,0.97); z-index:100;
      display:none; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center;
    }
    .result-card.active { display:flex; }
    .result-icon { font-size:36px; color:#C9A96E; margin-bottom:20px; }
    .result-title { font-family:'Noto Serif SC',serif; font-size:26px; font-weight:300; letter-spacing:6px; color:#2C1810; margin-bottom:12px; }
    .result-sub { font-size:13px; letter-spacing:2px; color:#8B7D72; line-height:2; margin-bottom:8px; }
    .result-score { font-size:14px; letter-spacing:2px; color:#C9A96E; margin-bottom:32px; }
    .result-product { max-width:200px; max-height:130px; object-fit:contain; border-radius:4px; margin-bottom:28px; }
    .result-btn {
      padding:14px 44px; border:0.5px solid #C9A96E; background:transparent; color:#C9A96E;
      font-family:'Noto Serif SC',serif; font-size:14px; letter-spacing:4px; cursor:pointer;
      text-decoration:none; transition:all 0.5s cubic-bezier(0.25,0.1,0.25,1); -webkit-tap-highlight-color:transparent;
    }
    .result-btn:active { background:rgba(201,169,110,0.1); }
    .result-btn-secondary { margin-top:14px; font-size:12px; letter-spacing:3px; color:#8B7D72; border-color:#8B7D72; }
  </style>
</head>
<body>
<div class="game-page">
  <div class="game-header">
    <a href="../" class="game-back">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      返回
    </a>
    <span class="game-header-title font-serif">慢慢焕</span>
    <span class="game-score-display"><em id="scoreNum">0</em> 分</span>
  </div>

  <!-- Product -->
  <div class="product-hero">
    <img src="../public/products/zaoC-wanA.jpg" alt="HBN早C晚A" />
    <div class="product-name font-serif">早C晚A 2.0</div>
    <div class="product-sub">昼夜焕颜 · 循时而为</div>
  </div>

  <!-- Drop zones -->
  <div class="game-area">
    <div class="zones">
      <div class="zone zone-morning" id="zoneMorning">
        <div class="zone-label font-serif">早</div>
        <div class="zone-product">α-熊果苷焕颜精萃水</div>
        <div class="zone-dropped" id="morningDropped"></div>
      </div>
      <div class="zone zone-evening" id="zoneEvening">
        <div class="zone-label font-serif">晚</div>
        <div class="zone-product">视黄醇塑颜精华乳</div>
        <div class="zone-dropped" id="eveningDropped"></div>
      </div>
    </div>

    <!-- Current ingredient -->
    <div class="carousel-area">
      <div class="carousel-hint font-serif" id="carouselHint">将成分归入对的时辰</div>
      <div class="card-carousel" id="cardCarousel"></div>
      <div class="action-row">
        <div class="action-btn btn-morning font-serif" id="btnMorning">归入早C</div>
        <div class="action-btn btn-evening font-serif" id="btnEvening">归入晚A</div>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-label font-serif">焕颜进度</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-stats">
      <span class="progress-stat">已归类 <em id="doneNum">0</em>/10</span>
      <span class="progress-stat">正确率 <em id="accNum">0</em>%</span>
    </div>
  </div>
</div>

<!-- Result -->
<div class="result-card" id="resultCard">
  <div class="result-icon">◆</div>
  <div class="result-title font-serif">昼夜循时</div>
  <div class="result-sub" id="resultMsg"></div>
  <div class="result-score" id="resultScore"></div>
  <img src="../public/products/zaoC-wanA-detail.jpg" alt="早C晚A" class="result-product" />
  <button class="result-btn font-serif" id="retryBtn">再来一次</button>
  <a href="../" class="result-btn result-btn-secondary font-serif">返回首页</a>
</div>

<script>
(function(){
  'use strict';

  // Fix all "../" links to point to correct home URL
  var basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
  var homePath = basePath.substring(0, basePath.lastIndexOf('/') + 1) || './';
  var links = document.querySelectorAll('a[href="../"], a[href="../index.html"]');
  for (var i = 0; i < links.length; i++) {
    links[i].href = homePath;
  }

  // Ingredients: period='morning' or 'evening'
  var INGREDIENTS = [
    { name:'α-熊果苷', desc:'焕亮肌肤，均匀肤色', period:'morning' },
    { name:'VC衍生物', desc:'抗氧化，抵御光损伤', period:'morning' },
    { name:'防晒成分', desc:'阻隔紫外线，守护晨光', period:'morning' },
    { name:'烟酰胺', desc:'提亮肤色，修护屏障', period:'morning' },
    { name:'光果甘草', desc:'温和焕亮，自然透光', period:'morning' },
    { name:'视黄醇', desc:'促生胶原，紧致淡纹', period:'evening' },
    { name:'胜肽复合', desc:'淡化细纹，提升弹性', period:'evening' },
    { name:'神经酰胺', desc:'修护屏障，深层锁水', period:'evening' },
    { name:'玻色因', desc:'促进粘多糖，充盈肌肤', period:'evening' },
    { name:'角鲨烷', desc:'仿生皮脂，夜间修护', period:'evening' }
  ];

  var current = 0, score = 0, correct = 0, total = INGREDIENTS.length;
  var shuffled = [];

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function init() {
    shuffled = shuffle(INGREDIENTS);
    current = 0; score = 0; correct = 0;
    document.getElementById('morningDropped').innerHTML = '';
    document.getElementById('eveningDropped').innerHTML = '';
    document.getElementById('scoreNum').textContent = '0';
    document.getElementById('doneNum').textContent = '0';
    document.getElementById('accNum').textContent = '0';
    document.getElementById('progressFill').style.width = '0%';
    showCurrent();
  }

  function showCurrent() {
    var carousel = document.getElementById('cardCarousel');
    carousel.innerHTML = '';

    if (current >= shuffled.length) {
      showResult();
      return;
    }

    var ing = shuffled[current];
    var card = document.createElement('div');
    card.className = 'ingredient-card';
    card.innerHTML =
      '<div class="ing-name font-serif">' + ing.name + '</div>' +
      '<div class="ing-desc">' + ing.desc + '</div>' +
      '<div class="ing-type">属于哪一个时辰？</div>';
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px)';
    carousel.appendChild(card);

    setTimeout(function(){
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 50);
  }

  function choose(period) {
    if (current >= shuffled.length) return;
    var ing = shuffled[current];
    var isCorrect = (ing.period === period);

    if (isCorrect) {
      correct++;
      score += 10;
      // Add mini tag
      var zone = period === 'morning' ? document.getElementById('morningDropped') : document.getElementById('eveningDropped');
      var tag = document.createElement('span');
      tag.className = 'mini-tag';
      tag.textContent = ing.name;
      zone.appendChild(tag);
    } else {
      // Wrong flash
      var wrongZone = period === 'morning' ? document.getElementById('zoneMorning') : document.getElementById('zoneEvening');
      wrongZone.classList.add('wrong-flash');
      setTimeout(function(){ wrongZone.classList.remove('wrong-flash'); }, 400);
    }

    current++;
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('doneNum').textContent = current;
    document.getElementById('accNum').textContent = Math.round(correct / current * 100);
    document.getElementById('progressFill').style.width = (current / total * 100) + '%';

    // Transition card out
    var card = document.querySelector('.ingredient-card');
    if (card) {
      card.style.opacity = '0';
      card.style.transform = period === 'morning' ? 'translateX(-60px)' : 'translateX(60px)';
    }

    setTimeout(showCurrent, 400);
  }

  function showResult() {
    var acc = Math.round(correct / total * 100);
    var msg = '';
    if (acc >= 90) msg = '你已深谙昼夜护肤之道';
    else if (acc >= 70) msg = '慢慢来，循时而为';
    else msg = '慢一点，再感受昼夜的节奏';

    document.getElementById('resultMsg').textContent = msg;
    document.getElementById('resultScore').textContent = '正确归类 ' + correct + '/' + total + ' · ' + acc + '% 正确率';
    document.getElementById('resultCard').classList.add('active');
  }

  document.getElementById('btnMorning').addEventListener('click', function(){ choose('morning'); });
  document.getElementById('btnEvening').addEventListener('click', function(){ choose('evening'); });
  document.getElementById('retryBtn').addEventListener('click', function(){
    document.getElementById('resultCard').classList.remove('active');
    init();
  });

  init();
})();
</script>
</body>
</html>
