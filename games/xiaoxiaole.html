<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <title>慢慢消 · 时光沉淀 — HBN</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    body { background:#F5EDE3; }
    .game-page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; }

    /* Header */
    .game-header { width:100%; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:relative; z-index:10; }
    .game-back { display:flex; align-items:center; gap:6px; text-decoration:none; color:#8B7D72; font-size:13px; letter-spacing:2px; -webkit-tap-highlight-color:transparent; }
    .game-back svg { width:18px; height:18px; stroke:#8B7D72; }
    .game-header-title { font-family:'Noto Serif SC',serif; font-size:14px; letter-spacing:4px; color:#C9A96E; }
    .game-score-display { font-size:13px; color:#8B7D72; letter-spacing:2px; }
    .game-score-display em { font-style:normal; color:#C9A96E; font-size:18px; }

    /* Board */
    .board-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:16px; width:100%; }
    .board { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; max-width:360px; width:100%; }

    /* Cell */
    .cell {
      aspect-ratio:1;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      border-radius:3px; cursor:pointer; user-select:none;
      transition: all 0.4s cubic-bezier(0.25,0.1,0.25,1);
      -webkit-tap-highlight-color:transparent;
      position:relative;
      border:0.5px solid rgba(201,169,110,0.12);
    }
    .cell .cell-icon { font-size:18px; line-height:1; }
    .cell .cell-name { font-size:7px; letter-spacing:0.5px; color:rgba(44,24,16,0.5); margin-top:1px; }
    .cell:active { transform:scale(0.92); }

    .cell.selected {
      border-color:#C9A96E;
      box-shadow:0 0 10px rgba(201,169,110,0.25);
      transform:scale(1.05);
    }

    .cell.eliminating {
      animation: cell-elim 0.7s cubic-bezier(0.25,0.1,0.25,1) forwards;
    }
    @keyframes cell-elim {
      0% { opacity:1; transform:scale(1); }
      40% { opacity:0.6; transform:scale(1.15); }
      100% { opacity:0; transform:scale(0.3); }
    }

    .cell.dropping {
      animation: cell-drop 0.4s cubic-bezier(0.25,0.1,0.25,1);
    }
    @keyframes cell-drop {
      0% { transform:translateY(-100%); opacity:0.5; }
      100% { transform:translateY(0); opacity:1; }
    }

    .cell.new-cell {
      animation: cell-new 0.5s cubic-bezier(0.25,0.1,0.25,1);
    }
    @keyframes cell-new {
      0% { transform:scale(0); opacity:0; }
      100% { transform:scale(1); opacity:1; }
    }

    /* Types */
    .type-0 { background:rgba(201,169,110,0.15); } .type-0 .cell-icon { color:#C9A96E; }
    .type-1 { background:rgba(139,154,123,0.15); } .type-1 .cell-icon { color:#8B9A7B; }
    .type-2 { background:rgba(201,160,135,0.15); } .type-2 .cell-icon { color:#C9A087; }
    .type-3 { background:rgba(139,111,94,0.15); } .type-3 .cell-icon { color:#8B6F5E; }
    .type-4 { background:rgba(107,142,114,0.15); } .type-4 .cell-icon { color:#6B8E72; }

    /* Hint */
    .game-hint { padding:12px 24px 32px; text-align:center; }
    .game-hint p { font-family:'Noto Serif SC',serif; font-size:12px; letter-spacing:3px; color:#8B7D72; line-height:2; }

    /* Combo indicator */
    .combo-popup {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-family:'Noto Serif SC',serif; font-size:24px; font-weight:300;
      letter-spacing:4px; color:#C9A96E; pointer-events:none;
      opacity:0; z-index:50;
    }
    .combo-popup.show {
      animation: combo-pop 1s cubic-bezier(0.25,0.1,0.25,1) forwards;
    }
    @keyframes combo-pop {
      0% { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
      30% { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
      100% { opacity:0; transform:translate(-50%,-60%) scale(1); }
    }

    /* Overlays */
    .overlay {
      position:fixed; inset:0; background:rgba(245,237,227,0.96);
      display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;
      padding:32px; text-align:center;
    }
    .overlay.hidden { display:none; }
    .overlay-icon { font-size:40px; margin-bottom:24px; color:#C9A96E; }
    .overlay-title { font-family:'Noto Serif SC',serif; font-size:26px; font-weight:300; letter-spacing:6px; color:#2C1810; margin-bottom:12px; }
    .overlay-sub { font-size:14px; letter-spacing:3px; color:#8B7D72; line-height:2; margin-bottom:8px; }
    .overlay-score { font-size:14px; letter-spacing:2px; color:#C9A96E; margin-bottom:36px; }
    .overlay-btn {
      padding:14px 44px; border:0.5px solid #C9A96E; background:transparent; color:#C9A96E;
      font-family:'Noto Serif SC',serif; font-size:14px; letter-spacing:4px; cursor:pointer;
      text-decoration:none; transition:all 0.5s cubic-bezier(0.25,0.1,0.25,1); -webkit-tap-highlight-color:transparent;
    }
    .overlay-btn:active { background:rgba(201,169,110,0.1); }
    .overlay-btn-secondary { margin-top:16px; font-size:12px; letter-spacing:3px; color:#8B7D72; border-color:#8B7D72; }
  </style>
</head>
<body>
<div class="game-page">
  <div class="game-header">
    <a href="javascript:void(0)" onclick="history.back()" class="game-back">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      返回
    </a>
    <span class="game-header-title font-serif">慢慢消</span>
    <span class="game-score-display"><em id="scoreNum">0</em> 分</span>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="game-hint">
    <p>交换相邻成分，三连即消<br/>慢慢沉淀，积少成多</p>
  </div>
</div>

<div class="combo-popup" id="comboPopup"></div>

<!-- Start -->
<div class="overlay" id="startOverlay">
  <div class="overlay-icon">◇</div>
  <div class="overlay-title font-serif">时光沉淀</div>
  <div class="overlay-sub">交换相邻的成分<br/>三连即可消融</div>
  <button class="overlay-btn font-serif" id="startBtn">开始沉淀</button>
</div>

<!-- End -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-icon">◆</div>
  <div class="overlay-title font-serif">沉淀完成</div>
  <div class="overlay-score" id="endScore"></div>
  <button class="overlay-btn font-serif" id="retryBtn">再来一次</button>
  <a href="javascript:void(0)" onclick="goHome()" class="overlay-btn overlay-btn-secondary font-serif">返回首页</a>
</div>

<script>
(function(){
  'use strict';

  // Navigate to home page reliably
  window.goHome = function() {
    var path = window.location.pathname;
    var homePath = path.substring(0, path.indexOf('/games/')) + '/';
    window.location.href = homePath;
  };

  var COLS = 6, ROWS = 6, NUM_TYPES = 5;
  var TYPES = [
    { name:'烟酰胺', icon:'◆' },
    { name:'玻色因', icon:'○' },
    { name:'视黄醇', icon:'△' },
    { name:'积雪草', icon:'▽' },
    { name:'维C', icon:'□' }
  ];

  var grid = []; // grid[row][col] = type index
  var selectedCell = null;
  var locked = false;
  var score = 0;
  var totalEliminated = 0;
  var movesLeft = 30;
  var combo = 0;

  function randType() {
    return Math.floor(Math.random() * NUM_TYPES);
  }

  function init() {
    // Fill grid ensuring no initial matches
    grid = [];
    for (var r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (var c = 0; c < COLS; c++) {
        var t;
        do {
          t = randType();
        } while (wouldMatch(r, c, t));
        grid[r][c] = t;
      }
    }
  }

  function wouldMatch(r, c, t) {
    // Check horizontal
    if (c >= 2 && grid[r][c-1] === t && grid[r][c-2] === t) return true;
    // Check vertical
    if (r >= 2 && grid[r-1] && grid[r-1][c] === t && grid[r-2] && grid[r-2][c] === t) return true;
    return false;
  }

  function render(animCells) {
    var el = document.getElementById('board');
    el.innerHTML = '';
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var t = grid[r][c];
        var cell = document.createElement('div');
        cell.className = 'cell type-' + t;
        cell.dataset.row = r;
        cell.dataset.col = c;
        cell.innerHTML = '<span class="cell-icon">' + TYPES[t].icon + '</span><span class="cell-name">' + TYPES[t].name + '</span>';
        cell.addEventListener('click', onCellClick);

        // Animations
        if (animCells) {
          var key = r + ',' + c;
          if (animCells.dropping && animCells.dropping.indexOf(key) >= 0) {
            cell.classList.add('dropping');
          }
          if (animCells.newCells && animCells.newCells.indexOf(key) >= 0) {
            cell.classList.add('new-cell');
          }
        }

        if (selectedCell && selectedCell.r === r && selectedCell.c === c) {
          cell.classList.add('selected');
        }

        el.appendChild(cell);
      }
    }

    document.getElementById('scoreNum').textContent = score;
  }

  function onCellClick(e) {
    if (locked) return;
    var cell = e.currentTarget;
    var r = parseInt(cell.dataset.row);
    var c = parseInt(cell.dataset.col);

    if (!selectedCell) {
      selectedCell = { r: r, c: c };
      render();
      return;
    }

    var sr = selectedCell.r, sc = selectedCell.c;

    if (sr === r && sc === c) {
      selectedCell = null;
      render();
      return;
    }

    // Check adjacency
    var isAdj = (Math.abs(sr - r) + Math.abs(sc - c)) === 1;
    if (!isAdj) {
      selectedCell = { r: r, c: c };
      render();
      return;
    }

    // Swap
    locked = true;
    selectedCell = null;
    var temp = grid[sr][sc];
    grid[sr][sc] = grid[r][c];
    grid[r][c] = temp;
    render();

    // Check matches
    var matches = findMatches();
    if (matches.length === 0) {
      // Swap back
      setTimeout(function() {
        grid[r][c] = grid[sr][sc];
        grid[sr][sc] = temp;
        render();
        locked = false;
      }, 300);
      return;
    }

    movesLeft--;
    combo = 0;
    processMatches(matches);
  }

  function findMatches() {
    var matched = {};
    // Horizontal
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS - 2; c++) {
        var t = grid[r][c];
        if (t === -1) continue;
        if (grid[r][c+1] === t && grid[r][c+2] === t) {
          var len = 3;
          while (c + len < COLS && grid[r][c+len] === t) len++;
          for (var i = 0; i < len; i++) matched[r + ',' + (c+i)] = true;
        }
      }
    }
    // Vertical
    for (var c2 = 0; c2 < COLS; c2++) {
      for (var r2 = 0; r2 < ROWS - 2; r2++) {
        var t2 = grid[r2][c2];
        if (t2 === -1) continue;
        if (grid[r2+1][c2] === t2 && grid[r2+2][c2] === t2) {
          var len2 = 3;
          while (r2 + len2 < ROWS && grid[r2+len2][c2] === t2) len2++;
          for (var j = 0; j < len2; j++) matched[(r2+j) + ',' + c2] = true;
        }
      }
    }
    return Object.keys(matched);
  }

  function processMatches(matches) {
    combo++;
    var pts = matches.length * 10 * combo;
    score += pts;
    totalEliminated += matches.length;

    if (combo > 1) {
      showCombo(combo);
    }

    // Animate elimination
    matches.forEach(function(key) {
      var parts = key.split(',');
      var r = parseInt(parts[0]), c = parseInt(parts[1]);
      var cellEl = document.querySelector('.cell[data-row="' + r + '"][data-col="' + c + '"]');
      if (cellEl) cellEl.classList.add('eliminating');
    });

    setTimeout(function() {
      // Remove matched cells
      matches.forEach(function(key) {
        var parts = key.split(',');
        grid[parseInt(parts[0])][parseInt(parts[1])] = -1;
      });

      // Gravity: drop cells down
      var droppingCells = [];
      var newCells = [];
      for (var c = 0; c < COLS; c++) {
        var writeRow = ROWS - 1;
        for (var r = ROWS - 1; r >= 0; r--) {
          if (grid[r][c] !== -1) {
            if (r !== writeRow) {
              grid[writeRow][c] = grid[r][c];
              grid[r][c] = -1;
              droppingCells.push(writeRow + ',' + c);
            }
            writeRow--;
          }
        }
        // Fill empty from top
        for (var r2 = writeRow; r2 >= 0; r2--) {
          grid[r2][c] = randType();
          newCells.push(r2 + ',' + c);
        }
      }

      render({ dropping: droppingCells, newCells: newCells });

      // Check chain reactions
      setTimeout(function() {
        var nextMatches = findMatches();
        if (nextMatches.length > 0) {
          processMatches(nextMatches);
        } else {
          locked = false;
          if (movesLeft <= 0) {
            endGame();
          }
        }
      }, 450);
    }, 600);
  }

  function showCombo(n) {
    var el = document.getElementById('comboPopup');
    var texts = ['', '', '二连消', '三连消', '四连消', '五连消'];
    el.textContent = n < texts.length ? texts[n] : n + '连消';
    el.className = 'combo-popup';
    // Force reflow
    void el.offsetWidth;
    el.className = 'combo-popup show';
  }

  function endGame() {
    document.getElementById('endScore').textContent = '最终得分 ' + score + ' 分 / 消除 ' + totalEliminated + ' 个成分';
    document.getElementById('endOverlay').classList.remove('hidden');
  }

  function startGame() {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('endOverlay').classList.add('hidden');
    score = 0; totalEliminated = 0; movesLeft = 30; combo = 0; locked = false; selectedCell = null;
    init();
    render();
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);

  // Pre-init display
  init();
  render();
})();
</script>
</body>
</html>
