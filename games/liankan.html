<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <title>慢慢寻 · 成分寻缘 — HBN</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    body { background: #F5EDE3; }
    .game-page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding:0; }

    /* Header */
    .game-header { width:100%; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:relative; z-index:10; }
    .game-back { display:flex; align-items:center; gap:6px; text-decoration:none; color:#8B7D72; font-size:13px; letter-spacing:2px; -webkit-tap-highlight-color:transparent; }
    .game-back svg { width:18px; height:18px; stroke:#8B7D72; }
    .game-header-title { font-family:'Noto Serif SC',serif; font-size:14px; letter-spacing:4px; color:#C9A96E; }
    .game-score-display { font-size:13px; color:#8B7D72; letter-spacing:2px; }
    .game-score-display em { font-style:normal; color:#C9A96E; font-size:18px; }

    /* Info bar */
    .game-info { width:100%; max-width:400px; padding:8px 24px 16px; display:flex; justify-content:space-between; align-items:center; }
    .game-info-item { font-size:12px; letter-spacing:2px; color:#8B7D72; }
    .game-info-item em { font-style:normal; color:#2C1810; }

    /* Board */
    .board-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:12px; width:100%; }
    .board { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; max-width:360px; width:100%; }

    /* Tile */
    .tile {
      aspect-ratio:1;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:rgba(255,255,255,0.65);
      border:0.5px solid rgba(201,169,110,0.18);
      border-radius:3px;
      cursor:pointer;
      transition: all 0.5s cubic-bezier(0.25,0.1,0.25,1);
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .tile:active { transform:scale(0.95); }
    .tile .tile-icon { font-size:22px; margin-bottom:2px; line-height:1; }
    .tile .tile-name { font-size:9px; letter-spacing:1px; color:#8B7D72; }

    .tile.selected {
      border-color:#C9A96E;
      background:rgba(201,169,110,0.1);
      box-shadow:0 0 12px rgba(201,169,110,0.2);
    }
    .tile.matched {
      animation: tile-match 0.8s cubic-bezier(0.25,0.1,0.25,1) forwards;
    }
    @keyframes tile-match {
      0% { opacity:1; transform:scale(1); }
      50% { opacity:0.6; transform:scale(1.08); background:rgba(201,169,110,0.15); }
      100% { opacity:0; transform:scale(0.6); }
    }
    .tile.wrong {
      animation: tile-wrong 0.5s cubic-bezier(0.25,0.1,0.25,1);
    }
    @keyframes tile-wrong {
      0%,100% { transform:translateX(0); }
      20% { transform:translateX(-4px); }
      40% { transform:translateX(4px); }
      60% { transform:translateX(-3px); }
      80% { transform:translateX(3px); }
    }
    .tile.empty { visibility:hidden; pointer-events:none; }

    /* Hint text */
    .game-hint { padding:16px 24px 40px; text-align:center; }
    .game-hint p { font-family:'Noto Serif SC',serif; font-size:13px; letter-spacing:3px; color:#8B7D72; line-height:2; }

    /* Win overlay */
    .overlay { position:fixed; inset:0; background:rgba(245,237,227,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
    .overlay.active { display:flex; }
    .overlay-title { font-family:'Noto Serif SC',serif; font-size:28px; font-weight:300; letter-spacing:6px; color:#2C1810; margin-bottom:12px; }
    .overlay-sub { font-size:14px; letter-spacing:3px; color:#8B7D72; margin-bottom:40px; }
    .overlay-btn {
      padding:14px 44px; border:0.5px solid #C9A96E; background:transparent; color:#C9A96E;
      font-family:'Noto Serif SC',serif; font-size:14px; letter-spacing:4px; cursor:pointer;
      text-decoration:none; transition:all 0.5s cubic-bezier(0.25,0.1,0.25,1); -webkit-tap-highlight-color:transparent;
    }
    .overlay-btn:active { background:rgba(201,169,110,0.1); }

    /* Ingredient colors */
    .ing-0 { background:rgba(201,169,110,0.12); } .ing-0 .tile-icon { color:#C9A96E; }
    .ing-1 { background:rgba(139,154,123,0.12); } .ing-1 .tile-icon { color:#8B9A7B; }
    .ing-2 { background:rgba(201,160,135,0.12); } .ing-2 .tile-icon { color:#C9A087; }
    .ing-3 { background:rgba(139,111,94,0.12); } .ing-3 .tile-icon { color:#8B6F5E; }
    .ing-4 { background:rgba(212,184,122,0.12); } .ing-4 .tile-icon { color:#D4B87A; }
    .ing-5 { background:rgba(160,128,96,0.12); } .ing-5 .tile-icon { color:#A08060; }
    .ing-6 { background:rgba(107,142,114,0.12); } .ing-6 .tile-icon { color:#6B8E72; }
    .ing-7 { background:rgba(180,140,110,0.12); } .ing-7 .tile-icon { color:#B48C6E; }
  </style>
</head>
<body>
<div class="game-page">
  <div class="game-header">
    <a href="javascript:void(0)" onclick="goHome()" class="game-back">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      返回
    </a>
    <span class="game-header-title font-serif">慢慢寻</span>
    <span class="game-score-display"><em id="scoreNum">0</em> 分</span>
  </div>

  <div class="game-info">
    <span class="game-info-item">配对 <em id="matchNum">0</em>/8</span>
    <span class="game-info-item">步数 <em id="stepNum">0</em></span>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="game-hint">
    <p>缓慢寻找，细心配对<br/>让相同成分相遇</p>
  </div>
</div>

<!-- Win -->
<div class="overlay" id="winOverlay">
  <div class="overlay-title font-serif">寻缘完成</div>
  <div class="overlay-sub" id="winMsg"></div>
  <a href="javascript:void(0)" onclick="goHome()" class="overlay-btn font-serif">返回首页</a>
</div>

<script>
(function(){
  'use strict';

  // Navigate to home page reliably
  window.goHome = function() {
    var path = window.location.pathname;
    var homePath = path.substring(0, path.indexOf('/games/')) + '/';
    window.location.href = homePath;
  };

  var INGREDIENTS = [
    { name:'烟酰胺', icon:'◆' },
    { name:'视黄醇', icon:'◇' },
    { name:'玻色因', icon:'○' },
    { name:'熊果苷', icon:'△' },
    { name:'积雪草', icon:'▽' },
    { name:'神经酰胺', icon:'□' },
    { name:'维C', icon:'◈' },
    { name:'胜肽', icon:'⬡' }
  ];

  var ROWS = 4, COLS = 4, TOTAL = ROWS * COLS;
  var board = [], selected = null, matched = 0, steps = 0, score = 0, locked = false;

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function initBoard() {
    var pairs = [];
    for (var i = 0; i < INGREDIENTS.length; i++) {
      pairs.push(i, i);
    }
    shuffle(pairs);
    board = pairs;
    renderBoard();
  }

  function renderBoard() {
    var el = document.getElementById('board');
    el.innerHTML = '';
    for (var i = 0; i < board.length; i++) {
      var idx = board[i];
      if (idx === -1) {
        var emptyDiv = document.createElement('div');
        emptyDiv.className = 'tile empty';
        emptyDiv.dataset.idx = i;
        el.appendChild(emptyDiv);
        continue;
      }
      var ing = INGREDIENTS[idx];
      var tile = document.createElement('div');
      tile.className = 'tile ing-' + idx;
      tile.dataset.idx = i;
      tile.dataset.ing = idx;
      tile.innerHTML = '<span class="tile-icon">' + ing.icon + '</span><span class="tile-name">' + ing.name + '</span>';
      tile.addEventListener('click', onTileClick);
      el.appendChild(tile);
    }
  }

  function getTileEl(idx) {
    return document.querySelector('.tile[data-idx="' + idx + '"]');
  }

  function onTileClick(e) {
    if (locked) return;
    var tile = e.currentTarget;
    var idx = parseInt(tile.dataset.idx);
    var ing = parseInt(tile.dataset.ing);
    if (board[idx] === -1) return;

    if (selected === null) {
      selected = idx;
      tile.classList.add('selected');
    } else if (selected === idx) {
      tile.classList.remove('selected');
      selected = null;
    } else {
      steps++;
      document.getElementById('stepNum').textContent = steps;
      var prevTile = getTileEl(selected);
      var prevIng = board[selected];

      if (prevIng === ing) {
        // Match!
        locked = true;
        tile.classList.add('selected');
        setTimeout(function() {
          tile.classList.remove('selected');
          tile.classList.add('matched');
          prevTile.classList.remove('selected');
          prevTile.classList.add('matched');
          setTimeout(function() {
            board[idx] = -1;
            board[selected] = -1;
            tile.classList.add('empty');
            tile.classList.remove('matched');
            prevTile.classList.add('empty');
            prevTile.classList.remove('matched');
            matched++;
            score += Math.max(10, 50 - steps * 2);
            document.getElementById('matchNum').textContent = matched;
            document.getElementById('scoreNum').textContent = score;
            selected = null;
            locked = false;
            if (matched >= INGREDIENTS.length) {
              showWin();
            }
          }, 600);
        }, 200);
      } else {
        // No match
        locked = true;
        tile.classList.add('selected');
        setTimeout(function() {
          tile.classList.add('wrong');
          prevTile.classList.add('wrong');
          setTimeout(function() {
            tile.classList.remove('selected', 'wrong');
            prevTile.classList.remove('selected', 'wrong');
            selected = null;
            locked = false;
          }, 500);
        }, 300);
      }
    }
  }

  function showWin() {
    document.getElementById('winMsg').textContent = '用 ' + steps + ' 步完成了全部配对';
    document.getElementById('winOverlay').classList.add('active');
  }

  // --- Remove watermarks ---
  function removeWatermarks() {
    var sels = [
      '[class*="watermark"]','[class*="Watermark"]','[id*="watermark"]','[id*="Watermark"]',
      '[class*="coze"]','[id*="coze"]','[class*="trae"]','[id*="trae"]',
      '[class*="coding"]','[id*="coding"]','[class*="powered-by"]','[class*="poweredBy"]',
      '[id*="powered-by"]','[id*="poweredBy"]','[class*="branding"]','[id*="branding"]',
      'a[href*="coze"]','a[href*="trae"]','a[href*="coding"]',
      '.coze-watermark','.coze_coding','.trae-watermark','.trae_coding','.coding-watermark','.coding_watermark'
    ];
    sels.forEach(function(sel) {
      try {
        var els = document.querySelectorAll(sel);
        for (var i = els.length - 1; i >= 0; i--) {
          if (els[i].parentNode) els[i].parentNode.removeChild(els[i]);
        }
      } catch(e) {}
    });
  }
  removeWatermarks();
  var _wmFrameCount = 0;
  function _wmFrameLoop() {
    _wmFrameCount++;
    if (_wmFrameCount % 30 === 0) removeWatermarks();
    requestAnimationFrame(_wmFrameLoop);
  }
  _wmFrameLoop();
  var _wmObs = new MutationObserver(removeWatermarks);
  _wmObs.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class','id','style'] });
  var _wmStyle = document.createElement('style');
  _wmStyle.textContent = [
    '[class*="watermark"],[class*="Watermark"],[id*="watermark"],[id*="Watermark"]',
    '[class*="coze"],[id*="coze"],[class*="trae"],[id*="trae"]',
    '[class*="coding"],[id*="coding"]',
    '[class*="powered-by"],[class*="poweredBy"],[id*="powered-by"],[id*="poweredBy"]',
    '[class*="branding"],[id*="branding"]',
    'a[href*="coze"],a[href*="trae"],a[href*="coding"]',
    '.coze-watermark,.coze_coding,.trae-watermark,.trae_coding,.coding-watermark,.coding_watermark',
    'iframe[src*="coze"],iframe[src*="trae"],iframe[src*="coding"]',
    '{display:none!important;visibility:hidden!important;opacity:0!important;',
    'height:0!important;max-height:0!important;width:0!important;max-width:0!important;',
    'overflow:hidden!important;pointer-events:none!important;',
    'position:absolute!important;z-index:-9999!important;margin:0!important;padding:0!important;border:none!important;}'
  ].join('');
  document.head.appendChild(_wmStyle);

  initBoard();
})();
</script>
</body>
</html>
