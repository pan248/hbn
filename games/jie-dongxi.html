<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <title>慢慢接 · 晨露凝收 — HBN</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    body { background:#F5EDE3; overflow:hidden; }
    .game-page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; position:relative; }

    /* Header */
    .game-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:relative; z-index:10; }
    .game-back { display:flex; align-items:center; gap:6px; text-decoration:none; color:#8B7D72; font-size:13px; letter-spacing:2px; -webkit-tap-highlight-color:transparent; }
    .game-back svg { width:18px; height:18px; stroke:#8B7D72; }
    .game-header-title { font-family:'Noto Serif SC',serif; font-size:14px; letter-spacing:4px; color:#C9A96E; }
    .game-score-display { font-size:13px; color:#8B7D72; letter-spacing:2px; }
    .game-score-display em { font-style:normal; color:#C9A96E; font-size:18px; }

    /* Info bar */
    .game-info { padding:4px 24px 8px; display:flex; justify-content:space-between; width:100%; }
    .game-info-item { font-size:12px; letter-spacing:2px; color:#8B7D72; }
    .game-info-item em { font-style:normal; color:#2C1810; }

    /* Canvas area */
    .canvas-wrap { flex:1; position:relative; overflow:hidden; touch-action:none; }
    .canvas-wrap canvas { display:block; width:100%; height:100%; }

    /* Start / Win overlay */
    .overlay {
      position:fixed; inset:0; background:rgba(245,237,227,0.96);
      display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;
      padding:32px; text-align:center;
    }
    .overlay.hidden { display:none; }
    .overlay-icon { font-size:40px; margin-bottom:24px; color:#C9A96E; }
    .overlay-title { font-family:'Noto Serif SC',serif; font-size:26px; font-weight:300; letter-spacing:6px; color:#2C1810; margin-bottom:12px; }
    .overlay-sub { font-size:14px; letter-spacing:3px; color:#8B7D72; line-height:2; margin-bottom:8px; }
    .overlay-score { font-size:14px; letter-spacing:2px; color:#C9A96E; margin-bottom:36px; }
    .overlay-btn {
      padding:14px 44px; border:0.5px solid #C9A96E; background:transparent; color:#C9A96E;
      font-family:'Noto Serif SC',serif; font-size:14px; letter-spacing:4px; cursor:pointer;
      text-decoration:none; transition:all 0.5s cubic-bezier(0.25,0.1,0.25,1); -webkit-tap-highlight-color:transparent;
    }
    .overlay-btn:active { background:rgba(201,169,110,0.1); }
    .overlay-btn-secondary { margin-top:16px; font-size:12px; letter-spacing:3px; color:#8B7D72; border-color:#8B7D72; }
  </style>
</head>
<body>
<div class="game-page">
  <div class="game-header">
    <a href="/" class="game-back">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      返回
    </a>
    <span class="game-header-title font-serif">慢慢接</span>
    <span class="game-score-display"><em id="scoreNum">0</em> 滴</span>
  </div>

  <div class="game-info">
    <span class="game-info-item">漏掉 <em id="missNum">0</em>/5</span>
    <span class="game-info-item">时间 <em id="timeNum">0</em>s</span>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
  </div>
</div>

<!-- Start -->
<div class="overlay" id="startOverlay">
  <div class="overlay-icon">◇</div>
  <div class="overlay-title font-serif">晨露凝收</div>
  <div class="overlay-sub">缓缓移动瓶身<br/>接住每一滴精华</div>
  <button class="overlay-btn font-serif" id="startBtn">开始接露</button>
</div>

<!-- End -->
<div class="overlay hidden" id="endOverlay">
  <div class="overlay-icon">◆</div>
  <div class="overlay-title font-serif" id="endTitle">时光沉淀</div>
  <div class="overlay-sub" id="endMsg"></div>
  <div class="overlay-score" id="endScore"></div>
  <button class="overlay-btn font-serif" id="retryBtn">再来一次</button>
  <a href="../" class="overlay-btn overlay-btn-secondary font-serif">返回首页</a>
</div>

<script>
(function(){
  'use strict';

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var wrap = document.getElementById('canvasWrap');

  var W, H, dpr;
  var running = false, animId = null;

  // Game state
  var bottle = { x:0, y:0, w:70, h:90 };
  var drops = [];
  var score = 0, missed = 0, maxMiss = 5, startTime = 0;
  var spawnTimer = 0, spawnInterval = 1200; // ms between drops
  var lastTime = 0;

  // Drop types — themed skincare ingredients
  var DROP_TYPES = [
    { label:'烟酰胺', color:'#C9A96E', points:10, radius:14, speed:1.2 },
    { label:'玻色因', color:'#8B9A7B', points:15, radius:12, speed:1.0 },
    { label:'视黄醇', color:'#D4B87A', points:20, radius:10, speed:1.5 },
    { label:'维C', color:'#C9A087', points:12, radius:13, speed:1.1 },
    { label:'积雪草', color:'#6B8E72', points:25, radius:9, speed:1.8 },
  ];

  // Caught particles
  var particles = [];

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    bottle.y = H - bottle.h - 30;
    bottle.x = Math.min(Math.max(bottle.x, bottle.w/2), W - bottle.w/2);
  }

  function spawnDrop() {
    var type = DROP_TYPES[Math.floor(Math.random() * DROP_TYPES.length)];
    drops.push({
      x: type.radius + Math.random() * (W - type.radius * 2),
      y: -type.radius * 2,
      type: type,
      speed: type.speed * (0.8 + Math.random() * 0.4),
      alpha: 1
    });
  }

  function spawnParticles(x, y, color) {
    for (var i = 0; i < 8; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 1 + Math.random() * 2;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        alpha: 1,
        color: color,
        radius: 2 + Math.random() * 3,
        life: 40
      });
    }
  }

  function update(dt) {
    spawnTimer += dt;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnDrop();
      // Gradually speed up
      spawnInterval = Math.max(600, spawnInterval - 5);
    }

    // Update drops
    for (var i = drops.length - 1; i >= 0; i--) {
      var d = drops[i];
      d.y += d.speed * (dt / 16);

      // Check catch
      if (d.y + d.type.radius >= bottle.y &&
          d.y - d.type.radius <= bottle.y + bottle.h &&
          d.x >= bottle.x - bottle.w/2 - d.type.radius &&
          d.x <= bottle.x + bottle.w/2 + d.type.radius) {
        score += d.type.points;
        document.getElementById('scoreNum').textContent = score;
        spawnParticles(d.x, d.y, d.type.color);
        drops.splice(i, 1);
        continue;
      }

      // Missed
      if (d.y > H + d.type.radius * 2) {
        missed++;
        document.getElementById('missNum').textContent = missed;
        drops.splice(i, 1);
        if (missed >= maxMiss) {
          endGame();
          return;
        }
      }
    }

    // Update particles
    for (var j = particles.length - 1; j >= 0; j--) {
      var p = particles[j];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life--;
      p.alpha = Math.max(0, p.life / 40);
      if (p.life <= 0) particles.splice(j, 1);
    }

    // Update time
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timeNum').textContent = elapsed;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Draw subtle background circles
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#C9A96E';
    ctx.lineWidth = 0.5;
    for (var c = 0; c < 3; c++) {
      ctx.beginPath();
      ctx.arc(W * (0.2 + c * 0.3), H * 0.3, 80 + c * 40, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();

    // Draw drops
    for (var i = 0; i < drops.length; i++) {
      var d = drops[i];
      ctx.save();
      // Glow
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = d.type.color;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.type.radius * 2, 0, Math.PI * 2);
      ctx.fill();
      // Main drop shape
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = d.type.color;
      ctx.beginPath();
      // Teardrop shape
      ctx.moveTo(d.x, d.y - d.type.radius * 1.4);
      ctx.bezierCurveTo(
        d.x - d.type.radius, d.y - d.type.radius * 0.3,
        d.x - d.type.radius, d.y + d.type.radius * 0.5,
        d.x, d.y + d.type.radius
      );
      ctx.bezierCurveTo(
        d.x + d.type.radius, d.y + d.type.radius * 0.5,
        d.x + d.type.radius, d.y - d.type.radius * 0.3,
        d.x, d.y - d.type.radius * 1.4
      );
      ctx.fill();
      // Label
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#2C1810';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.type.label, d.x, d.y + d.type.radius + 14);
      ctx.restore();
    }

    // Draw particles
    for (var j = 0; j < particles.length; j++) {
      var p = particles[j];
      ctx.save();
      ctx.globalAlpha = p.alpha * 0.6;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Draw bottle
    ctx.save();
    var bx = bottle.x - bottle.w / 2;
    var by = bottle.y;
    var bw = bottle.w;
    var bh = bottle.h;

    // Bottle body
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#C9A96E';
    ctx.beginPath();
    ctx.moveTo(bx + 8, by);
    ctx.lineTo(bx + bw - 8, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + 8);
    ctx.lineTo(bx + bw, by + bh - 6);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - 6, by + bh);
    ctx.lineTo(bx + 6, by + bh);
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - 6);
    ctx.lineTo(bx, by + 8);
    ctx.quadraticCurveTo(bx, by, bx + 8, by);
    ctx.closePath();
    ctx.fill();

    // Bottle outline
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#C9A96E';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Bottle neck
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#C9A96E';
    ctx.fillRect(bx + bw/2 - 10, by - 16, 20, 18);
    ctx.strokeStyle = '#C9A96E';
    ctx.strokeRect(bx + bw/2 - 10, by - 16, 20, 18);

    // Bottle cap
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#8B6F5E';
    ctx.fillRect(bx + bw/2 - 12, by - 22, 24, 8);

    // Fill level
    var fillH = Math.min(score * 1.5, bh - 12);
    if (fillH > 0) {
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#C9A96E';
      ctx.fillRect(bx + 3, by + bh - 3 - fillH, bw - 6, fillH);
    }

    // Label on bottle
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#2C1810';
    ctx.font = '10px "Noto Serif SC", serif';
    ctx.textAlign = 'center';
    ctx.fillText('HBN', bottle.x, by + bh / 2 + 4);
    ctx.restore();
  }

  function gameLoop(timestamp) {
    if (!running) return;
    var dt = lastTime ? (timestamp - lastTime) : 16;
    if (dt > 100) dt = 16; // cap
    lastTime = timestamp;
    update(dt);
    draw();
    animId = requestAnimationFrame(gameLoop);
  }

  function startGame() {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('endOverlay').classList.add('hidden');
    score = 0; missed = 0; drops = []; particles = [];
    spawnInterval = 1200; spawnTimer = 0; lastTime = 0;
    startTime = Date.now();
    document.getElementById('scoreNum').textContent = '0';
    document.getElementById('missNum').textContent = '0';
    document.getElementById('timeNum').textContent = '0';
    bottle.x = W / 2;
    running = true;
    animId = requestAnimationFrame(gameLoop);
  }

  function endGame() {
    running = false;
    if (animId) cancelAnimationFrame(animId);
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('endTitle').textContent = missed >= maxMiss ? '露已散尽' : '时光沉淀';
    document.getElementById('endMsg').textContent = '你用了 ' + elapsed + ' 秒';
    document.getElementById('endScore').textContent = '共接住 ' + score + ' 滴精华';
    document.getElementById('endOverlay').classList.remove('hidden');
  }

  // Touch / Mouse control
  var dragging = false;
  function onPointerMove(e) {
    if (!running) return;
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    bottle.x = Math.min(Math.max(x, bottle.w/2), W - bottle.w/2);
  }

  canvas.addEventListener('touchstart', function(e) { dragging = true; onPointerMove(e); }, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('mousemove', onPointerMove);

  // Init
  resize();
  window.addEventListener('resize', resize);
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);

  // --- Remove watermarks ---
  function _wmRemove() {
    var sels = [
      '[class*="watermark"]','[class*="Watermark"]','[id*="watermark"]','[id*="Watermark"]',
      '[class*="coze"]','[id*="coze"]','[class*="trae"]','[id*="trae"]',
      '[class*="coding"]','[id*="coding"]','[class*="powered-by"]','[class*="poweredBy"]',
      '[id*="powered-by"]','[id*="poweredBy"]','[class*="branding"]','[id*="branding"]',
      'a[href*="coze"]','a[href*="trae"]','a[href*="coding"]',
      '.coze-watermark','.coze_coding','.trae-watermark','.trae_coding','.coding-watermark','.coding_watermark'
    ];
    sels.forEach(function(sel) {
      try {
        var els = document.querySelectorAll(sel);
        for (var i = els.length - 1; i >= 0; i--) {
          if (els[i].parentNode) els[i].parentNode.removeChild(els[i]);
        }
      } catch(e) {}
    });
  }
  _wmRemove();
  var _wmFC = 0;
  function _wmFL() {
    _wmFC++;
    if (_wmFC % 30 === 0) _wmRemove();
    requestAnimationFrame(_wmFL);
  }
  _wmFL();
  var _wmMO = new MutationObserver(_wmRemove);
  _wmMO.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class','id','style'] });
  var _wmS = document.createElement('style');
  _wmS.textContent = [
    '[class*="watermark"],[class*="Watermark"],[id*="watermark"],[id*="Watermark"]',
    '[class*="coze"],[id*="coze"],[class*="trae"],[id*="trae"]',
    '[class*="coding"],[id*="coding"]',
    '[class*="powered-by"],[class*="poweredBy"],[id*="powered-by"],[id*="poweredBy"]',
    '[class*="branding"],[id*="branding"]',
    'a[href*="coze"],a[href*="trae"],a[href*="coding"]',
    '.coze-watermark,.coze_coding,.trae-watermark,.trae_coding,.coding-watermark,.coding_watermark',
    'iframe[src*="coze"],iframe[src*="trae"],iframe[src*="coding"]',
    '{display:none!important;visibility:hidden!important;opacity:0!important;',
    'height:0!important;max-height:0!important;width:0!important;max-width:0!important;',
    'overflow:hidden!important;pointer-events:none!important;',
    'position:absolute!important;z-index:-9999!important;margin:0!important;padding:0!important;border:none!important;}'
  ].join('');
  document.head.appendChild(_wmS);
})();
</script>
</body>
</html>
